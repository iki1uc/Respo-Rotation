<!DOCTYPE html>
<html>
<head>
    <title>Respo‑Rotation – Wirbel-System</title>
    <style>
        body {
            background: #111;
            color: #0f0;
            font-family: monospace;
            padding: 20px;
        }
        h2 { color: #0f0; margin-bottom: 20px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .cell {
            background: #222;
            border: 1px solid #444;
            padding: 15px;
            border-radius: 6px;
            white-space: pre-wrap;
            min-height: 120px;
        }
        .title {
            font-weight: bold;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

<h2>Respo‑Rotation – Wirbel‑System</h2>

<div id="grid" class="grid"></div>

<script src="wh.el.js"></script>

<script>
// 9 Slots erzeugen
const grid = document.getElementById("grid");
for (let i = 0; i < 9; i++) {
    const cell = document.createElement("div");
    cell.className = "cell";
    cell.id = "slot" + i;
    cell.innerHTML = `<div class="title">Slot ${i+1}</div>waiting…`;
    grid.appendChild(cell);
}

// Rotation + Whirlpool Boost
function rotateSlots() {
    const first = RESPO_ID.structure.chain.shift();
    RESPO_ID.structure.chain.push(first);
}

function whirlBoost() {
    return {
        swirl: Math.floor(Math.random() * 720),
        pull: Math.random().toFixed(3),
        boost: (Math.random() * 10).toFixed(2)
    };
}

function updateGrid() {
    for (let i = 0; i < 9; i++) {
        const slot = document.getElementById("slot" + i);
        const w = whirlBoost();
        slot.innerHTML =
            `<div class="title">${RESPO_ID.structure.chain[i]}</div>` +
            `POS: ${i+1}<br>` +
            `SWIRL: ${w.swirl}°<br>` +
            `SOG: ${w.pull}<br>` +
            `BOOST: ${w.boost}x`;
    }
}

// Start
updateGrid();
setInterval(() => {
    rotateSlots();
    updateGrid();
}, 2000);
</script>

</body>
</html>
